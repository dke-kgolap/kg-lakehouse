server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect stdout from every lakehouse-* container via Docker service discovery.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["lakehouse-.*"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(lakehouse-.+)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
    pipeline_stages:
      # Extract trace-correlation fields from the services' JSON logs.
      - json:
          expressions:
            traceId: traceId
            spanId: spanId
            level: level
      - labels:
          traceId:
          spanId:
          level:
