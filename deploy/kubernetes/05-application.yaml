apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: graph-service
    app.kubernetes.io/part-of: lakehouse
    tier: application
  name: graph-service
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-service
  template:
    metadata:
      annotations:
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: '8083'
        prometheus.io/scrape: 'true'
      labels:
        app: graph-service
        tier: application
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: lakehouse-app-config
        - configMapRef:
            name: graph-service-config
        - secretRef:
            name: lakehouse-secrets
            optional: false
        image: basharahmad/lakehouse-graph-service:1.0.2
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health/liveness
            port: mgmt
          initialDelaySeconds: 30
          periodSeconds: 10
        name: graph-service
        ports:
        - containerPort: 8083
          name: mgmt
        - containerPort: 9090
          name: grpc
        readinessProbe:
          failureThreshold: 12
          httpGet:
            path: /actuator/health/readiness
            port: mgmt
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 1500m
            memory: 1536Mi
          requests:
            cpu: 300m
            memory: 768Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /app/config/schemas
          name: schemas
          readOnly: true
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - configMap:
          name: lakehouse-schemas
        name: schemas
