apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: cassandra
    app.kubernetes.io/part-of: lakehouse
    tier: infra
  name: cassandra
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  serviceName: cassandra
  template:
    metadata:
      labels:
        app: cassandra
        tier: infra
    spec:
      containers:
      - env:
        - name: CASSANDRA_CLUSTER_NAME
          value: lakehouse
        - name: CASSANDRA_DC
          value: datacenter1
        - name: CASSANDRA_RACK
          value: Rack1
        - name: CASSANDRA_SEEDS
          value: cassandra-0.cassandra.lakehouse.svc.cluster.local
        - name: CASSANDRA_ENDPOINT_SNITCH
          value: GossipingPropertyFileSnitch
        - name: MAX_HEAP_SIZE
          value: 1G
        - name: HEAP_NEWSIZE
          value: 256M
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: cassandra:4.1
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - nodetool drain
        livenessProbe:
          failureThreshold: 5
          initialDelaySeconds: 120
          periodSeconds: 30
          tcpSocket:
            port: cql
        name: cassandra
        ports:
        - containerPort: 9042
          name: cql
        - containerPort: 7000
          name: intra-node
        - containerPort: 7001
          name: tls-intra-node
        - containerPort: 7199
          name: jmx
        readinessProbe:
          failureThreshold: 30
          initialDelaySeconds: 30
          periodSeconds: 10
          tcpSocket:
            port: cql
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1.5Gi
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /var/lib/cassandra
          name: cassandra-data
      terminationGracePeriodSeconds: 1800
  volumeClaimTemplates:
  - metadata:
      name: cassandra-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: kafka
    app.kubernetes.io/part-of: lakehouse
    tier: infra
  name: kafka
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  serviceName: kafka
  template:
    metadata:
      labels:
        app: kafka
        tier: infra
    spec:
      containers:
      - env:
        - name: KAFKA_NODE_ID
          value: '0'
        - name: KAFKA_PROCESS_ROLES
          value: controller,broker
        - name: KAFKA_LISTENERS
          value: PLAINTEXT://:9092,CONTROLLER://:9093
        - name: KAFKA_ADVERTISED_LISTENERS
          value: PLAINTEXT://kafka-0.kafka.lakehouse.svc.cluster.local:9092
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: PLAINTEXT
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: CONTROLLER
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: 0@kafka-0.kafka.lakehouse.svc.cluster.local:9093
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: '1'
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: '1'
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: '1'
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: '0'
        - name: CLUSTER_ID
          value: lakehouse-kraft-cluster
        image: apache/kafka:3.7.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          initialDelaySeconds: 60
          periodSeconds: 30
          tcpSocket:
            port: plaintext
        name: kafka
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 9093
          name: controller
        readinessProbe:
          failureThreshold: 12
          initialDelaySeconds: 20
          periodSeconds: 10
          tcpSocket:
            port: plaintext
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 768Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/kraft-combined-logs
          name: kafka-data
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: minio
    app.kubernetes.io/part-of: lakehouse
    tier: infra
  name: minio
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  serviceName: minio
  template:
    metadata:
      labels:
        app: minio
        tier: infra
    spec:
      containers:
      - args:
        - server
        - /data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              key: LAKEHOUSE_MINIO_ACCESS_KEY
              name: lakehouse-secrets
              optional: false
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: LAKEHOUSE_MINIO_SECRET_KEY
              name: lakehouse-secrets
              optional: false
        image: minio/minio:RELEASE.2024-03-30T09-41-56Z
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: s3
          initialDelaySeconds: 15
          periodSeconds: 30
        name: minio
        ports:
        - containerPort: 9000
          name: s3
        - containerPort: 9001
          name: console
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: s3
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /data
          name: minio-data
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: redis
    app.kubernetes.io/part-of: lakehouse
    tier: infra
  name: redis
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  serviceName: redis
  template:
    metadata:
      labels:
        app: redis
        tier: infra
    spec:
      containers:
      - args:
        - redis-server
        - --appendonly
        - 'yes'
        - --protected-mode
        - 'no'
        - --maxmemory
        - 800mb
        - --maxmemory-policy
        - noeviction
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 30
          tcpSocket:
            port: client
        name: redis
        ports:
        - containerPort: 6379
          name: client
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /data
          name: redis-data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
