# Credentials for the lakehouse services.
#
# This is a TEMPLATE. Copy it to a private file, replace every CHANGE_ME with a
# real value, and apply that file instead:
#
#     cp 01-secrets.example.yaml secret.yaml
#     # edit secret.yaml
#     kubectl apply -f secret.yaml
#
# Keep your filled-in secret.yaml out of version control.
apiVersion: v1
kind: Secret
metadata:
  name: lakehouse-secrets
  namespace: lakehouse
  labels:
    app.kubernetes.io/part-of: lakehouse
type: Opaque
stringData:
  # Application API credentials (HTTP basic auth on the surface gateway).
  LAKEHOUSE_USER: CHANGE_ME
  LAKEHOUSE_PASSWORD: CHANGE_ME
  # MinIO object-store root credentials (also used by the services to read/write files).
  LAKEHOUSE_MINIO_ACCESS_KEY: CHANGE_ME
  LAKEHOUSE_MINIO_SECRET_KEY: CHANGE_ME
  # Grafana admin login.
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: CHANGE_ME
