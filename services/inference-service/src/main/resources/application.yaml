spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: inference-service

# Spring MVC runs only to host Actuator on the management port; business traffic is gRPC on :9091.
server:
  port: ${LAKEHOUSE_SERVER_PORT:0}

lakehouse:
  grpc:
    port: ${LAKEHOUSE_GRPC_PORT:9091}
  inference:
    chunk:
      target-triples: ${LAKEHOUSE_INFERENCE_CHUNK_TRIPLES:200}
  cache:
    kind: ${LAKEHOUSE_CACHE_KIND:redis}
    redis:
      host: ${LAKEHOUSE_REDIS_HOST:localhost}
      port: ${LAKEHOUSE_REDIS_PORT:6379}
      ttl-minutes: ${LAKEHOUSE_REDIS_TTL_MINUTES:60}
  schemas:
    root: ${LAKEHOUSE_SCHEMAS_ROOT:./config/schemas}

management:
  server:
    port: ${LAKEHOUSE_MGMT_PORT:8084}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: ${LAKEHOUSE_TRACING_SAMPLE:1.0}
  otlp:
    tracing:
      endpoint: ${LAKEHOUSE_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
