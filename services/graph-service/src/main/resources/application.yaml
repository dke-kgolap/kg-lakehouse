spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: graph-service

# Spring MVC runs only to host Actuator on the management port (8083).
# All business traffic still flows through the gRPC server on :9090.
server:
  port: ${LAKEHOUSE_SERVER_PORT:0}

lakehouse:
  grpc:
    port: ${LAKEHOUSE_GRPC_PORT:9090}
  graph:
    chunk:
      target-quads: ${LAKEHOUSE_GRAPH_CHUNK_QUADS:68}
    l1:
      enabled: ${LAKEHOUSE_GRAPH_L1_ENABLED:true}
      max-entries: ${LAKEHOUSE_GRAPH_L1_MAX_ENTRIES:4096}
  cache:
    kind: ${LAKEHOUSE_CACHE_KIND:redis}
    redis:
      host: ${LAKEHOUSE_REDIS_HOST:localhost}
      port: ${LAKEHOUSE_REDIS_PORT:6379}
      ttl-minutes: ${LAKEHOUSE_REDIS_TTL_MINUTES:60}
    invalidation:
      group-id-suffix: ${LAKEHOUSE_CACHE_INVALIDATION_GROUP_SUFFIX:default}
  schemas:
    root: ${LAKEHOUSE_SCHEMAS_ROOT:./config/schemas}
  storage:
    kind: ${LAKEHOUSE_STORAGE_KIND:local}
    local:
      root: ${LAKEHOUSE_STORAGE_LOCAL_ROOT:./data/storage}
    minio:
      endpoint: ${LAKEHOUSE_MINIO_ENDPOINT:http://localhost:9000}
      bucket: ${LAKEHOUSE_MINIO_BUCKET:lakehouse}
      access-key: ${LAKEHOUSE_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${LAKEHOUSE_MINIO_SECRET_KEY:minioadmin}
  cassandra:
    host: ${LAKEHOUSE_CASSANDRA_HOST:127.0.0.1}
    port: ${LAKEHOUSE_CASSANDRA_PORT:9042}
    local-datacenter: ${LAKEHOUSE_CASSANDRA_DC:datacenter1}
    keyspace: ${LAKEHOUSE_CASSANDRA_KEYSPACE:lakehouse}
  messaging:
    bootstrap-servers: ${LAKEHOUSE_KAFKA_BOOTSTRAP:localhost:9092}

management:
  server:
    port: ${LAKEHOUSE_MGMT_PORT:8083}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: ${LAKEHOUSE_TRACING_SAMPLE:1.0}
  otlp:
    tracing:
      endpoint: ${LAKEHOUSE_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
