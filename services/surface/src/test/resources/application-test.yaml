spring:
  application:
    name: surface-test

server:
  port: 0

lakehouse:
  auth:
    username: admin
    password: admin
  schemas:
    root: ${java.io.tmpdir}/lakehouse-test-schemas
  storage:
    kind: local
    local:
      root: ${java.io.tmpdir}/lakehouse-test-storage
    minio:
      endpoint: http://localhost:9000
      bucket: test
      access-key: x
      secret-key: x
  cassandra:
    host: 127.0.0.1
    port: 9042
    local-datacenter: datacenter1
    keyspace: lakehouse_test
  messaging:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
