schema:
  id: weather
  dimensions:
    time:
      levels:
        - name: year
          depth: 0
          rollup_to: null
          rollup_function: null
        - name: month
          depth: 1
          rollup_to: year
          rollup_function: "builtin:date_to_year"

    station:
      levels:
        - name: country
          depth: 0
          rollup_to: null
          rollup_function: null
        - name: region
          depth: 1
          rollup_to: country
          rollup_function: "lookup"
        - name: station
          depth: 2
          rollup_to: region
          rollup_function: "lookup"

  hierarchies:
    station:
      - { country: Austria, region: Upper-Austria, station: LOWL }
      - { country: Austria, region: Vienna,        station: LOWW }
      - { country: Germany, region: Bavaria,       station: EDDM }
